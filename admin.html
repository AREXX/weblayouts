<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Premium Quality Cuts — Appointments</title>
<style>
  :root{ --ink:#201e1d; --paper:#f3f2f2; --gold:#d9a520; --gold-d:#a97e12; --line:rgba(32,30,29,.12); }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  header{background:var(--ink);color:var(--paper);padding:18px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:5}
  header .k{font:800 10px/1 sans-serif;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  header h1{font:800 18px/1.1 sans-serif;margin:4px 0 0}
  header .sp{flex:1}
  .wrap{max-width:820px;margin:0 auto;padding:20px}
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tab{appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 16px;font:700 13px/1 sans-serif;cursor:pointer;color:var(--ink)}
  .tab.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn{appearance:none;border:0;border-radius:8px;padding:12px 18px;font:800 13px/1 sans-serif;cursor:pointer;background:var(--gold);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .gate{max-width:360px;margin:14vh auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px}
  .gate h2{font:800 20px/1.2 sans-serif;margin:0 0 6px}
  .gate p{font-size:13.5px;opacity:.6;margin:0 0 18px;line-height:1.5}
  .gate input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;font:600 16px/1 sans-serif;margin-bottom:12px}
  .daygroup{margin-bottom:22px}
  .dayhead{font:800 12px/1 sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-d);margin:0 2px 10px;display:flex;justify-content:space-between}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .time{font:800 17px/1 sans-serif;min-width:82px}
  .time small{display:block;font:600 11px/1.3 sans-serif;opacity:.5;margin-top:4px}
  .who{flex:1;min-width:180px}
  .who .n{font:800 15px/1.2 sans-serif}
  .who .s{font-size:13px;opacity:.7;margin-top:3px}
  .who .m{font-size:12px;opacity:.55;margin-top:5px}
  .who a{color:var(--gold-d)}
  .badge{display:inline-block;font:800 10px/1 sans-serif;letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .b-booked{background:color-mix(in srgb,var(--gold) 22%,transparent);color:var(--gold-d)}
  .b-confirmed{background:#dff2e0;color:#2f7d32}
  .b-cancelled{background:#fbe3df;color:#b23a2a}
  .b-noshow{background:#eee;color:#777}
  .acts{display:flex;gap:6px;flex-wrap:wrap;width:100%}
  .act{appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:9px 12px;font:800 12px/1 sans-serif;cursor:pointer;color:var(--ink)}
  .act.ok{border-color:#2f7d32;color:#2f7d32}
  .act.no{border-color:#b23a2a;color:#b23a2a}
  .act.mut{opacity:.7}
  .empty{text-align:center;opacity:.55;padding:50px 10px;line-height:1.6}
  .err{color:#b23a2a;font-size:13px;min-height:18px;margin-bottom:8px}
  .foot{text-align:center;opacity:.4;font-size:12px;padding:24px 0}
</style>
</head>
<body>
<div id="gate" class="gate">
  <h2>Appointments</h2>
  <p>Enter the shop PIN to view and manage bookings.</p>
  <div id="gate-err" class="err"></div>
  <input id="pin" type="password" inputmode="numeric" placeholder="Shop PIN" autocomplete="off">
  <button class="btn" style="width:100%" onclick="unlock()">Unlock</button>
</div>

<div id="app" hidden>
  <header>
    <div>
      <div class="k">Premium Quality Cuts</div>
      <h1>Appointments</h1>
    </div>
    <div class="sp"></div>
    <button class="tab" onclick="lock()">Lock</button>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button class="tab on" data-range="today" onclick="setRange('today',this)">Today</button>
      <button class="tab" data-range="upcoming" onclick="setRange('upcoming',this)">Upcoming</button>
      <button class="tab" data-range="all" onclick="setRange('all',this)">All</button>
      <div class="sp" style="flex:1"></div>
      <button class="tab" onclick="refresh()">↻ Refresh</button>
    </div>
    <div id="calbar"></div>
    <div id="err" class="err"></div>
    <div id="list"><div class="empty">Loading…</div></div>
    <div class="foot">Read-only to customers · actions here update the shop's book.</div>
  </div>
</div>

<script>
  var PIN="", RANGE="today";
  var API=(window.PQC_API_BASE||"")+"/api";

  function fmtMin(m){ var h=Math.floor(m/60),mm=m%60,ap=h>=12?"PM":"AM",hh=h%12||12; return hh+(mm?":"+("0"+mm).slice(-2):"")+" "+ap; }
  function fromYmd(s){ var p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
  function prettyDate(s){ return fromYmd(s).toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}); }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function digits(s){ return String(s||"").replace(/\D/g,""); }

  function api(path, opts){
    opts=opts||{}; opts.headers=Object.assign({ "x-admin-pin":PIN, "Accept":"application/json" }, opts.headers||{});
    return fetch(API+path, opts).then(function(r){
      return r.json().then(function(j){ if(!r.ok||!j.ok){ var e=new Error((j&&j.error)||("HTTP "+r.status)); e.status=r.status; throw e; } return j; });
    });
  }

  function unlock(){
    var p=document.getElementById("pin").value.trim();
    document.getElementById("gate-err").textContent="";
    PIN=p;
    api("/admin?range=today").then(function(){
      try{ sessionStorage.setItem("pqc.admin.pin", PIN); }catch(e){}
      document.getElementById("gate").hidden=true;
      document.getElementById("app").hidden=false;
      refresh();
    }).catch(function(e){
      PIN="";
      document.getElementById("gate-err").textContent = e.status===401 ? "Wrong PIN." : "Couldn't reach the server.";
    });
  }
  function lock(){ PIN=""; try{ sessionStorage.removeItem("pqc.admin.pin"); }catch(e){}
    document.getElementById("app").hidden=true; document.getElementById("gate").hidden=false; document.getElementById("pin").value=""; }

  function setRange(r, el){ RANGE=r; document.querySelectorAll(".tab[data-range]").forEach(function(t){ t.classList.toggle("on", t===el); }); refresh(); }

  function refresh(){
    document.getElementById("err").textContent="";
    api("/admin?range="+RANGE).then(render).catch(function(e){
      if(e.status===401){ lock(); return; }
      document.getElementById("err").textContent="Couldn't load appointments.";
    });
  }

  function act(ref, action){
    api("/admin",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ ref:ref, action:action }) })
      .then(refresh)
      .catch(function(){ document.getElementById("err").textContent="Action failed — try again."; });
  }

  function copyCal(){
    var i=document.getElementById("calurl"); if(!i) return;
    i.select(); i.setSelectionRange(0,99999);
    try{ document.execCommand("copy"); }catch(e){}
    if(navigator.clipboard) navigator.clipboard.writeText(i.value).catch(function(){});
    var b=document.getElementById("calcopy"); if(b){ var o=b.textContent; b.textContent="Copied!"; setTimeout(function(){ b.textContent=o; },1500); }
  }
  function renderCalbar(j){
    var el=document.getElementById("calbar"); if(!el) return;
    if(!j.calendar){ el.innerHTML=""; return; }
    var url=location.origin+j.calendar;
    el.innerHTML=
      '<div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px">'+
        '<div style="font:800 13px/1 sans-serif;margin-bottom:8px">📅 Sync to Google Calendar</div>'+
        '<div style="font-size:12.5px;opacity:.65;line-height:1.5;margin-bottom:10px">In Google Calendar → <b>Other calendars → ＋ → From URL</b> → paste this private link. Your appointments then appear automatically (Google refreshes it periodically). Keep the link private.</div>'+
        '<div style="display:flex;gap:8px">'+
          '<input id="calurl" readonly value="'+esc(url)+'" style="flex:1;min-width:0;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font:600 12px/1.3 ui-monospace,monospace;background:#faf9f8;color:var(--ink)">'+
          '<button id="calcopy" class="btn" onclick="copyCal()">Copy</button>'+
        '</div>'+
      '</div>';
  }

  function render(j){
    renderCalbar(j);
    var list=j.bookings||[], el=document.getElementById("list");
    if(!list.length){ el.innerHTML='<div class="empty">No appointments in this view.</div>'; return; }
    // group by day
    var groups={}, order=[];
    list.forEach(function(b){ if(!groups[b.ymd]){ groups[b.ymd]=[]; order.push(b.ymd); } groups[b.ymd].push(b); });
    var html="";
    order.forEach(function(ymd){
      var items=groups[ymd];
      var live=items.filter(function(b){ return b.status!=="cancelled"&&b.status!=="noshow"; }).length;
      html+='<div class="daygroup"><div class="dayhead"><span>'+esc(prettyDate(ymd))+(ymd===j.today?" · today":"")+'</span><span>'+live+' booked</span></div>';
      items.forEach(function(b){
        var st=b.status||"booked";
        html+='<div class="card">'+
          '<div class="time">'+fmtMin(b.start)+'<small>'+Math.round(b.durMin)+' min</small></div>'+
          '<div class="who">'+
            '<div class="n">'+esc(b.sname)+'<span class="badge b-'+esc(st)+'">'+esc(st)+'</span></div>'+
            '<div class="s">'+esc(b.name)+' · <a href="tel:'+esc(digits(b.phone))+'">'+esc(b.phone)+'</a>'+(b.email?' · <a href="mailto:'+esc(b.email)+'">'+esc(b.email)+'</a>':"")+'</div>'+
            '<div class="m">'+esc(b.price)+(b.depNum?(' · $'+(b.depNum%1?b.depNum.toFixed(2):b.depNum)+' deposit'):"")+' · Ref '+esc(b.ref)+
              (b.notes?' · “'+esc(b.notes)+'”':"")+
              (b.prevYmd?' · moved from '+esc(prettyDate(b.prevYmd))+' '+fmtMin(b.prevStart):"")+'</div>'+
          '</div>'+
          '<div class="acts">'+
            (st!=="confirmed"?'<button class="act ok" onclick="act(\''+b.ref+'\',\'confirm\')">Confirm</button>':"")+
            (st!=="noshow"?'<button class="act mut" onclick="act(\''+b.ref+'\',\'noshow\')">No-show</button>':"")+
            (st!=="cancelled"?'<button class="act no" onclick="act(\''+b.ref+'\',\'cancel\')">Cancel</button>':
              '<button class="act" onclick="act(\''+b.ref+'\',\'book\')">Restore</button>')+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    });
    el.innerHTML=html;
  }

  // resume a session PIN if present
  (function(){ try{ var p=sessionStorage.getItem("pqc.admin.pin"); if(p){ PIN=p;
    api("/admin?range=today").then(function(){ document.getElementById("gate").hidden=true; document.getElementById("app").hidden=false; refresh(); })
      .catch(function(){ PIN=""; }); } }catch(e){} })();
  document.getElementById("pin").addEventListener("keydown", function(e){ if(e.key==="Enter") unlock(); });
</script>
</body>
</html>
